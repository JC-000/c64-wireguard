# ld65 linker configuration for ip65 binary blob
# Produces a raw binary (no BASIC header) starting at $2000
# for inclusion in ACME project via !binary
#
# Jump table at $2000 (JUMPTAB segment), code/data follows.
# ZP at $02-$1B (standard cc65) — time-shared with crypto via save/restore.

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0000;  # no C stack needed
    __HIMEM__:     type = weak, value = $D000;
}

MEMORY {
    ZP:     file = "",  define = yes, start = $0002, size = $001A;
    MAIN:   file = %O,  start = $2000, size = $2000;
    BSS:    file = "",  start = $4000, size = $2000;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,   type = zp;
    JUMPTAB:   load = MAIN, type = ro;
    STARTUP:   load = MAIN, type = ro;
    LOWCODE:   load = MAIN, type = ro,  optional = yes;
    INIT:      load = MAIN, type = rw,  optional = yes;
    ONCE:      load = MAIN, type = ro,  optional = yes;
    CODE:      load = MAIN, type = ro;
    RODATA:    load = MAIN, type = ro;
    DATA:      load = MAIN, type = rw;
    BSS:       load = BSS,  type = bss;
}
