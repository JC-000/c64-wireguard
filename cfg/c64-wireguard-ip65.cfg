# c64-wireguard ld65 config — ip65/RR-Net backend
#
# Memory layout derived from the ACME build (see original src/main.asm):
#   $0801-$1FFF : LOADER     — BASIC stub + boot + net wrapper (~6 KB)
#   $2000-$37FF : NET_CODE   — ip65 blob (~4.8 KB + slack)
#   $3800-$77FF : MAIN_CODE  — crypto + transport + session + app code (16 KB)
#   $7800-$7BFF : SQTAB      — quarter-square multiply tables (1 KB, page-aligned)
#   $7C00-$9FFF : APP_EXTRA  — overflow region for app code/data (9 KB)
#   $A000-$BFFF : SHADOW_BSS — mutable state behind BASIC ROM shadow (8 KB)
#
# WireGuard is UDP-only; no TCP_BUF region.

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    ZP_IP65:     start = $0002, size = $001A, type = rw, define = yes;
    ZP_CRYPTO:   start = $001E, size = $0022, type = rw, define = yes;
    ZP_WIDE:     start = $0040, size = $0040, type = rw, define = yes;

    LOADADDR:    start = $07FF, size = $0002, file = %O;
    LOADER:      start = $0801, size = $17FF, file = %O, define = yes, fill = yes, fillval = $00;
    NET_CODE:    start = $2000, size = $1800, file = %O, define = yes, fill = yes, fillval = $00;
    MAIN_CODE:   start = $3800, size = $4000, file = %O, define = yes, fill = yes, fillval = $00;
    SQTAB:       start = $7800, size = $0400, file = %O, define = yes, fill = yes, fillval = $00;
    APP_EXTRA:   start = $7C00, size = $2400, file = %O, define = yes, fill = yes, fillval = $00;

    SHADOW_BSS:  start = $A000, size = $2000, type = rw, define = yes;
}

SEGMENTS {
    ZP_SHARED:     load = ZP_IP65,    type = zp,  optional = yes;
    ZEROPAGE:      load = ZP_CRYPTO,  type = zp,  optional = yes;
    ZP_WIDE:       load = ZP_WIDE,    type = zp,  optional = yes;

    LOADADDR:      load = LOADADDR,   type = ro;
    EXEHDR:        load = LOADER,     type = ro;
    STARTUP:       load = LOADER,     type = ro,  optional = yes;
    CODE:          load = LOADER,     type = ro;
    INIT:          load = LOADER,     type = ro,  optional = yes;

    NET_CODE:        load = NET_CODE,  type = ro;
    LOADER_OVERFLOW: load = NET_CODE,  type = ro,  optional = yes;

    # All non-ip65 code and initialised data live in MAIN_CODE.
    # Keep separate segment names so callers can reason about them,
    # but they all land in the same 16 KB region.
    RODATA:        load = MAIN_CODE, type = ro,  optional = yes;
    CRYPTO_CODE:   load = MAIN_CODE, type = ro,  optional = yes;
    CRYPTO_RODATA: load = MAIN_CODE, type = ro,  optional = yes;
    APP_CODE:      load = MAIN_CODE, type = ro,  optional = yes;
    APP_DATA:      load = MAIN_CODE, type = ro,  optional = yes;

    SQTAB_DATA:    load = SQTAB,     type = ro,  align = $100, optional = yes;

    # Overflow / tail region for any code that spills past MAIN_CODE.
    APP_EXTRA:     load = APP_EXTRA, type = ro,  optional = yes;

    # All BSS (crypto state, app state, ip65 driver state) goes behind
    # the BASIC ROM shadow; boot.s zeroes this region on entry.
    # CRYPTO_BSS goes FIRST and is page-aligned — data.s uses `.align 256`
    # on mul_dma_lo/mul_dma_hi (REU DMA targets that require page alignment
    # so that `lda mul_dma_lo,y` has a consistent low byte).
    CRYPTO_BSS:    load = SHADOW_BSS, type = bss, align = $100, optional = yes;
    BSS:           load = SHADOW_BSS, type = bss, optional = yes;
    APP_BSS:       load = SHADOW_BSS, type = bss, optional = yes;
    NET_BSS:       load = SHADOW_BSS, type = bss, optional = yes;
}
