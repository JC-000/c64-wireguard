# c64-wireguard ld65 config — ip65/RR-Net backend
#
# Memory layout (matches the ACME build, so tests that verify buffer
# placement (e.g. "< $8000") pass unchanged):
#   $0801-$1FFF : LOADER     — BASIC stub + boot + net wrapper (~6 KB)
#   $2000-$37FF : NET_CODE   — ip65 blob (~4.8 KB + slack)
#   $3800-$5FFF : MAIN_CODE  — crypto + transport + session + app code (10 KB)
#   $6000-$77FF : DATA_AREA  — all WG mutable state (6 KB; emitted as zero
#                              bytes in the PRG so BSS starts at zero)
#   $7800-$7BFF : SQTAB      — quarter-square multiply tables (1 KB,
#                              page-aligned; built at runtime)
#   $7C00-$9FFF : APP_EXTRA  — overflow / extra app data (9 KB)
#   $A000-$BFFF : ip65 BSS   — ip65's private BSS (DO NOT use for WG;
#                              boot.s leaves this untouched so ip65 owns it)
#
# The ACME build put WG's buffers throughout $32F0-$77FF alongside code;
# we replicate that by making DATA_AREA a type=ro file-backed region and
# routing all *_BSS / *_DATA segments into it. The zero bytes land in the
# PRG file so the C64 LOAD stamps them into RAM directly — no runtime
# zero-fill needed.

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    ZP_IP65:     start = $0002, size = $001A, type = rw, define = yes;
    ZP_CRYPTO:   start = $001E, size = $0022, type = rw, define = yes;
    ZP_WIDE:     start = $0040, size = $0040, type = rw, define = yes;

    LOADADDR:    start = $07FF, size = $0002, file = %O;
    LOADER:      start = $0801, size = $17FF, file = %O, define = yes, fill = yes, fillval = $00;
    # NET_CODE holds the ip65 blob (~4.8 KB).
    NET_CODE:    start = $2000, size = $12F0, file = %O, define = yes, fill = yes, fillval = $00;
    # MAIN_AREA_LO: code + data ($32F0-$7FFF = ~20.5 KB), must stay
    # below $8000 because sqtab_init writes 256 bytes at $8000 and
    # 256 bytes at $8200 at runtime (per the sqtab_lo / sqtab_hi
    # equates in src/crypto/poly1305.s). Any data placed at $8000-$83FF
    # would be clobbered when sqtab_init fires during boot.
    MAIN_AREA_LO: start = $32F0, size = $4D10, file = %O, define = yes, fill = yes, fillval = $00;
    # $8000-$83FF is reserved for sqtab_lo / sqtab_hi (runtime-only,
    # filled by sqtab_init at boot — no PRG bytes needed here).
    MAIN_AREA_HI: start = $8400, size = $1C00, file = %O, define = yes, fill = yes, fillval = $00;
}

SEGMENTS {
    ZP_SHARED:     load = ZP_IP65,    type = zp,  optional = yes;
    ZEROPAGE:      load = ZP_CRYPTO,  type = zp,  optional = yes;
    ZP_WIDE:       load = ZP_WIDE,    type = zp,  optional = yes;

    LOADADDR:      load = LOADADDR,   type = ro;
    EXEHDR:        load = LOADER,     type = ro;
    STARTUP:       load = LOADER,     type = ro,  optional = yes;
    CODE:          load = LOADER,     type = ro;
    INIT:          load = LOADER,     type = ro,  optional = yes;

    NET_CODE:        load = NET_CODE,  type = ro;
    LOADER_OVERFLOW: load = NET_CODE,  type = ro,  optional = yes;

    # Code + RO data + BSS land in MAIN_AREA_LO ($32F0-$7FFF) to stay
    # below the $8000 sqtab runtime region. Link order: code first,
    # then RO data, then BSS. BSS is emitted as zero bytes in the PRG
    # (region has fill=yes) so LOAD zeroes RAM for us.
    # CRYPTO_RODATA (blake2s_iv, blake2s_sigma, cc20_constants, cc20_qr_
    # table — ~1.4 KB of constant tables) goes into LOADER, which has
    # plenty of slack. This frees space in MAIN_AREA_LO for BSS.
    RODATA:        load = LOADER,       type = ro,  optional = yes;
    CRYPTO_RODATA: load = LOADER,       type = ro,  optional = yes;
    # X25519_RODATA: c64-x25519 sibling fe_p / x25_basepoint / mul38_*_tab /
    # sqr_*_tab / a24_b* tables under USE_X25519_SIBLING=1. align=$20 so
    # the sibling's `.align 32` lookup-table directives + `.assert
    # (fe_p & $1F) = 0` checks pass. ~2 KB of tables — fits into LOADER's
    # slack since the BASIC stub + boot code only consume ~6 KB of the
    # 6 KB LOADER region (ip65 cfg has LOADER sized at $17FF = 6143 B).
    X25519_RODATA: load = LOADER,       type = ro,  align = $20, optional = yes;
    # CHACHA_RODATA: c64-ChaCha20-Poly1305 sibling chacha_nibswap_*_tab
    # (2 x 256 B page-aligned LUTs) under USE_CHACHA_SIBLING=1.
    CHACHA_RODATA: load = LOADER,       type = ro,  align = $100, optional = yes;
    CRYPTO_CODE:   load = MAIN_AREA_LO, type = ro,  optional = yes;
    APP_CODE:      load = MAIN_AREA_LO, type = ro,  optional = yes;
    APP_DATA:      load = MAIN_AREA_LO, type = ro,  optional = yes;
    BSS:           load = MAIN_AREA_LO, type = bss, optional = yes;
    CRYPTO_BSS:    load = MAIN_AREA_LO, type = bss, align = $100, optional = yes;
    # APP_BSS lives in MAIN_AREA_HI so MAIN_AREA_LO has room for the
    # c64-ChaCha20-Poly1305 sibling's ~8 KB CHACHA_CODE under
    # USE_CHACHA_SIBLING=1. Under the default (no siblings) layout
    # APP_BSS still fits in HI alongside APP_EXTRA / APP_EXTRA_BSS; HI
    # has $1C00 = 7 KB and APP_BSS is ~4.4 KB. No file bytes move
    # because type=bss segments emit no PRG content. See the
    # CHACHA_CODE comment block below for sizing history.
    APP_BSS:       load = MAIN_AREA_HI, type = bss, optional = yes;
    NET_BSS:       load = MAIN_AREA_LO, type = bss, optional = yes;

    # Overflow bucket for anything that doesn't fit below $8000.
    # Placed AFTER the sqtab hole at $8000-$83FF.
    APP_EXTRA:     load = MAIN_AREA_HI, type = ro,  optional = yes;
    APP_EXTRA_BSS: load = MAIN_AREA_HI, type = bss, optional = yes;
    # X25519_BSS: c64-x25519 sibling fe25519_tmp1..4 / x25_* / mul_dma_*
    # buffers under USE_X25519_SIBLING=1. ~1.3 KB of BSS; lives in
    # MAIN_AREA_HI to avoid pushing MAIN_AREA_LO over budget (the in-tree
    # x25519 buffers used to live in MAIN_AREA_LO via CRYPTO_BSS; with
    # the sibling's slightly larger footprint + alignment padding, they
    # no longer fit).
    X25519_BSS:    load = MAIN_AREA_HI, type = bss, align = $100, optional = yes;
    # CHACHA_CODE / CHACHA_BSS: c64-ChaCha20-Poly1305 sibling code +
    # data_lib BSS under USE_CHACHA_SIBLING=1.
    #
    # Sizing history: the sibling Profile B archive was ~11 KB before
    # c64-ChaCha20-Poly1305 PR #36 (poly1305_multiply outer-loop roll,
    # opted into via -D POLY1305_MULTIPLY_ROLLED_OUTER=1 in
    # tools/integration/build_chacha20poly1305.sh). Post-PR #36 the
    # CHACHA_CODE segment is ~8 KB (measured 8,022 B at sibling pin
    # 8cc3ab3 against the size-reduction switches WG opts into; see
    # the integration script header for which switches and why).
    #
    # 8 KB does not fit in MAIN_AREA_LO once the other LO segments
    # (CRYPTO_CODE / APP_CODE / APP_DATA / *BSS) are accounted for —
    # only ~4 KB of LO slack survives after them. To compensate, when
    # USE_CHACHA_SIBLING=1 we also route APP_BSS to MAIN_AREA_HI (it
    # is a "type=bss" segment, so no file bytes move; ld65 will place
    # it after CHACHA_CODE + CHACHA_BSS + X25519_BSS in HI as long as
    # there is room). This is the cheapest layout shuffle that lets
    # the bumped sibling fit; see the APP_BSS line below.
    #
    # If MAIN_AREA_HI overflows in a future combo (e.g. WG grows
    # APP_BSS further), the next levers are:
    #   1. Drop in-tree consumers of mul_8x8 / chacha20_quarter_round
    #      (src/crypto/fe25519.s and src/wg/cookie.s) so WG can opt
    #      into PR #35 alt 1 (LIB_VARIANT_AEAD_ONLY=1, saves another
    #      ~1 KB of CHACHA_CODE).
    #   2. Migrate more BSS to MAIN_AREA_HI (CRYPTO_BSS, NET_BSS).
    CHACHA_CODE:   load = MAIN_AREA_LO, type = ro,  optional = yes;
    CHACHA_BSS:    load = MAIN_AREA_HI, type = bss, optional = yes;

}
