# c64-wireguard ld65 config — ip65/RR-Net backend
#
# Adapted from c64-https/cfg/c64-https-ip65.cfg. WireGuard is UDP-only,
# so the TCP_BUF region is omitted. Other segments mirror c64-https to
# minimize drift.
#
# MEMORY map:
#   $0801-$1FFF : LOADER     (BASIC stub + boot + net wrapper)
#   $2000-$3FFF : NET_CODE   (ip65 code, delivered as .incbin blob)
#   $4000-$5FFF : NET_BSS    (ip65 BSS, not written to file)
#   $6000-$77FF : CRYPTO     (crypto code + tables; ends below sqtab)
#   $7800-$7BFF : SQTAB      (quarter-square multiply tables, page-aligned)
#   $7C00-$9FFF : APP        (handshake/transport/session/app code + data)
#   $A000-$BFFF : SHADOW_BSS (mutable state behind BASIC ROM shadow)
#
# Notes:
# - The ip65 blob in WG is smaller than in c64-https (~4.8 KB vs ~7 KB),
#   so NET_CODE has ~3 KB of tail slack that a LOADER_OVERFLOW segment
#   can ride along in if boot code outgrows LOADER.
# - sqtab MUST be page-aligned; its segment aligns to $0100.
# - CRYPTO / APP split matches WG's current ACME layout so Phase 3/4
#   migrations don't have to relocate anything.

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    ZP_IP65:     start = $0002, size = $001A, type = rw, define = yes;
    ZP_CRYPTO:   start = $001E, size = $0022, type = rw, define = yes;
    ZP_WIDE:     start = $0040, size = $0040, type = rw, define = yes;

    LOADADDR:    start = $07FF, size = $0002, file = %O;
    LOADER:      start = $0801, size = $17FF, file = %O, define = yes, fill = yes, fillval = $00;
    NET_CODE:    start = $2000, size = $2000, file = %O, define = yes, fill = yes, fillval = $00;
    NET_BSS:     start = $4000, size = $2000, file = %O, define = yes, fill = yes, fillval = $00;
    CRYPTO:      start = $6000, size = $1800, file = %O, define = yes, fill = yes, fillval = $00;
    SQTAB:       start = $7800, size = $0400, file = %O, define = yes, fill = yes, fillval = $00;
    APP:         start = $7C00, size = $2400, file = %O, define = yes, fill = yes, fillval = $00;

    SHADOW_BSS:  start = $A000, size = $2000, type = rw, define = yes;
}

SEGMENTS {
    ZP_SHARED:     load = ZP_IP65,    type = zp,  optional = yes;
    ZEROPAGE:      load = ZP_CRYPTO,  type = zp,  optional = yes;
    ZP_WIDE:       load = ZP_WIDE,    type = zp,  optional = yes;

    LOADADDR:      load = LOADADDR,   type = ro;
    EXEHDR:        load = LOADER,     type = ro;
    STARTUP:       load = LOADER,     type = ro,  optional = yes;
    CODE:          load = LOADER,     type = ro;
    RODATA:        load = CRYPTO,     type = ro,  optional = yes;
    INIT:          load = LOADER,     type = ro,  optional = yes;

    NET_CODE:        load = NET_CODE, type = ro;
    LOADER_OVERFLOW: load = NET_CODE, type = ro,  optional = yes;
    NET_BSS:         load = NET_BSS,  type = bss, optional = yes;

    CRYPTO_CODE:   load = CRYPTO,     type = ro,  optional = yes;
    CRYPTO_RODATA: load = CRYPTO,     type = ro,  optional = yes;

    SQTAB_DATA:    load = SQTAB,      type = ro,  align = $100, optional = yes;

    APP_CODE:      load = APP,        type = ro,  optional = yes;
    APP_DATA:      load = APP,        type = ro,  optional = yes;

    BSS:           load = SHADOW_BSS, type = bss, optional = yes;
    CRYPTO_BSS:    load = SHADOW_BSS, type = bss, optional = yes;
    APP_BSS:       load = SHADOW_BSS, type = bss, optional = yes;
}
